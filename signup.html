<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Atelier account to place custom orders, track designs and access exclusive collections.">
  <title>Atelier | Create Account</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎩</text></svg>">
</head>
<body>
  <div class="auth-icons">
    <button class="theme-toggle" aria-label="Toggle theme"></button>
    <button class="rtl-toggle" aria-label="Toggle RTL"></button>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><ellipse cx="18" cy="24" rx="16" ry="5" fill="currentColor" opacity="0.3"/><path d="M6 24c0-2 2-4 4-8s4-10 8-10 6 6 8 10 4 6 4 8" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/><line x1="4" y1="24" x2="32" y2="24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          Atelier
        </a>
        <h1>Create Account</h1>
        <p>Join Atelier and start your millinery journey</p>
      </div>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label" for="signup-firstname">First Name</label>
          <input type="text" class="form-input" id="signup-firstname" placeholder="Your first name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-lastname">Last Name</label>
          <input type="text" class="form-input" id="signup-lastname" placeholder="Your last name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-phone">Phone Number</label>
          <input type="tel" class="form-input" id="signup-phone" placeholder="+1 (555) 000-0000">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="signup-password" placeholder="Create a password" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-confirm">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="signup-confirm" placeholder="Confirm your password" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-check" style="margin-bottom:var(--space-xl);">
          <input type="checkbox" id="terms" required>
          <label for="terms">I agree to the <a href="#" class="form-link">Terms of Service</a> and <a href="#" class="form-link">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
      </form>

      <div class="divider"><span>or sign up with</span></div>

      <div class="social-logins">
        <button class="social-btn" id="google-signup">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 0 12c0 1.94.46 3.77 1.28 5.4l3.56-2.77.01-.54z" fill="#FBBC05"/><path d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.09 14.97 0 12 0 7.7 0 3.99 2.47 2.18 6.07l3.66 2.84c.87-2.6 3.3-4.16 6.16-4.16z" fill="#EA4335"/></svg>
          Sign up with Google
        </button>
        <button class="social-btn" id="apple-signup">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Sign up with Apple
        </button>
        <button class="social-btn" id="facebook-signup">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Sign up with Facebook
        </button>
      </div>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="form-link">Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
